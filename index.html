<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VU Amsterdam Android Smartphone Study</title>
  <meta name="description" content="Earn up to €97.50 by taking part in a 14-day VU Amsterdam study on everyday smartphone use and attention." />
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #5b6470;
      --border: #d9dee5;
      --accent: #005aa7;
      --accent-2: #0b7a75;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --radius: 18px;
      --max: 980px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 24%, var(--bg) 100%);
      line-height: 1.6;
    }

    a { color: var(--accent); }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .hero {
      padding: 56px 0 28px;
    }

    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      display: grid;
      gap: 24px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e7f0fb;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    h1, h2, h3 {
      line-height: 1.15;
      margin: 0 0 12px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      max-width: 11ch;
    }

    h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .lead {
      font-size: 1.13rem;
      max-width: 66ch;
</html>
